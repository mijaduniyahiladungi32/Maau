name: engc

on:
  schedule:
    - cron: "*/10 * * * *"  # Runs every 10 minutes
  workflow_dispatch:

jobs:
  update-playlist:
    runs-on: ubuntu-latest

    env:
      PASSSIP: ${{ secrets.PASSSIXP }}
      TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
      TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
      REMOTE_DOMAIN_URL: ${{ secrets.REMOTE_DOMAIN_URL }}

    steps:
      - name: Checkout this repository
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Unzip protected Python script
        run: unzip -o -P "$PASSSIP" pbc.zip

      - name: Run Python script
        run: python pbc.py

      - name: Delete script after running
        if: always()
        run: rm -f pbc.py

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add *.txt
          git commit -m "Update playlist files [skip ci]" || echo "No changes to commit"
          git push
